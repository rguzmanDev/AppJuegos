# fly.toml app configuration file generated for appjuegos-ws on 2026-06-23T17:14:11Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'appjuegos-ws'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile.ws'

[env]
  CORS_ORIGIN = 'https://appjuegos.fly.dev,https://cuddle.rgcore.dev'

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
