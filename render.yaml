# Render Blueprint — https://render.com/docs/blueprint-spec

services:
  - type: web
    name: cuddle-ws
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm ci --include=dev
    startCommand: npm run server
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: CORS_ORIGIN
        value: https://cuddle.onrender.com,https://cuddle-wxs7.onrender.com,https://cuddle.rgcore.dev,http://localhost:3000

  - type: web
    name: cuddle
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NEXT_PUBLIC_WS_URL
        value: https://cuddle-ws.onrender.com
