# Render Blueprint — https://render.com/docs/blueprint-spec
# Deploy: Render Dashboard → New → Blueprint → connect repo AppJuegos

services:
  # WebSocket (deploy first — frontend needs its URL)
  - type: web
    name: cuddle-ws
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm ci
    startCommand: npm run server
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        value: https://cuddle.onrender.com,https://cuddle.rgcore.dev,http://localhost:3000

  # Next.js frontend
  - type: web
    name: cuddle
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_WS_URL
        value: https://cuddle-ws.onrender.com
